services:
  - type: web
    name: rag-chatbot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port 10000 --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant 
      - key: RETRIEVER_SCORE_THRESHOLD
        value: "0.1"
      - key: LLM_MAX_TOKENS
        value: "512"
      - key: VECTOR_STORE_TYPE
        value: flat
      - key: EMBEDDING_MODEL_NAME
        value: all-MiniLM-L6-v2
      - key: RETRIEVER_TOP_K
        value: "3"
      - key: API_PORT
        value: "10000"