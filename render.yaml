services:
  - type: web
    name: rag-chatbot
    env: python
    plan: starter          # 512MB free tier — fits now with lazy loading
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-8b-8192
      - key: RETRIEVER_SCORE_THRESHOLD
        value: "0.1"
      - key: LLM_MAX_TOKENS
        value: "512"
      - key: VECTOR_STORE_TYPE
        value: flat
      - key: EMBEDDING_MODEL_NAME
        value: all-MiniLM-L6-v2
      - key: RETRIEVER_TOP_K
        value: "3"